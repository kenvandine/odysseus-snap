name: Check for new releases

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-github:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get upstream version
        id: upstream
        run: |
          # Read APP_VERSION straight from the file — no need to clone the whole
          # repo (which carries large media). It lives in src/constants.py now;
          # core/constants.py is a backward-compat shim, so fall back to it.
          base="https://raw.githubusercontent.com/pewdiepie-archdaemon/odysseus/dev"
          VERSION=$(curl -fsSL "$base/src/constants.py" 2>/dev/null \
            | grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -fsSL "$base/core/constants.py" 2>/dev/null \
              | grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' | head -1)
          fi
          if [ -z "$VERSION" ]; then
            echo "Failed to get version from upstream"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get this repo's latest release
        id: current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The snap version is adopted from upstream at build time, so track
          # what this repo has already published.
          CURRENT=$(gh release view --json tagName -q .tagName 2>/dev/null | sed 's/^v//' || echo "")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.upstream.outputs.version != steps.current.outputs.version
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.upstream.outputs.version }}
          name: Release ${{ steps.upstream.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
