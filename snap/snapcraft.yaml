name: odysseus
base: core24
adopt-info: odysseus
summary: Self-hosted AI workspace
description: |
  Odysseus is a privacy-focused, self-hosted AI workspace that runs entirely on
  your own hardware. It provides a full-featured browser UI for chat, document
  analysis, deep web research, calendar sync, image generation, speech-to-text,
  email, and more — connecting to Ollama, LM Studio, OpenAI, Anthropic, and any
  OpenAI-compatible endpoint.

  Nothing leaves your machine beyond the LLM API calls you explicitly configure.
  Your conversations, documents, uploaded files, and personal settings are stored
  in ~/snap/odysseus/common/app/data and persist across snap updates.

  QUICK START

  After installation, run:

    odysseus

  Then open http://localhost:7000 in your browser to reach the UI. The default
  port can be changed by setting ODYSSEUS_PORT in the environment or in your
  .env file.

  CONFIGURATION

  Place a .env file at ~/snap/odysseus/common/.env to set API keys, LLM hosts,
  and other options before starting the server. All variables from the upstream
  .env.example are supported; for example:

    OPENAI_API_KEY=sk-...
    LLM_HOST=localhost
    ODYSSEUS_PORT=7000
    ODYSSEUS_HOST=127.0.0.1

  AUTH

  Authentication can be enabled by setting AUTH_ENABLED=true in your .env file.

title: Odysseus
source-code: https://github.com/kenvandine/odysseus-snap
issues: https://github.com/kenvandine/odysseus-snap/issues
contact: https://github.com/kenvandine/odysseus-snap/issues
website: https://pewdiepie-archdaemon.github.io/odysseus/
license: AGPL-3.0

grade: stable
confinement: classic

apps:
  odysseus:
    command: bin/odysseus-launch

parts:
  launcher:
    plugin: dump
    source: snap/local
    organize:
      bin/odysseus-launch: bin/odysseus-launch

  odysseus:
    # Use nil plugin to bypass the python plugin's post-build Python-payload
    # check, which fails for core24 because python3.12 is filtered from
    # stage-packages as a base-manifest package.
    plugin: nil
    source: https://github.com/pewdiepie-archdaemon/odysseus.git
    source-branch: dev
    build-packages:
      - python3-venv
      - python3-dev
      - build-essential
      - cmake
      - git
      - libssl-dev
      - libffi-dev
    stage-packages:
      - nodejs
      - npm
      - git
      - curl
      - tmux
      - openssh-client
      - libgomp1
    override-build: |
      # setup.py is an application first-run script, not a Python packaging
      # file. Rename it so pip never treats the source tree as an installable
      # package (which would trigger the app-level setup code and abort the
      # build with missing-deps errors).
      mv setup.py _setup_app.py

      # Start from a clean install dir so re-runs (incremental builds) don't
      # try to recreate a venv over a previous one whose pyvenv.cfg points at
      # the runtime /snap path (absent inside the build instance).
      rm -rf "$CRAFT_PART_INSTALL"
      mkdir -p "$CRAFT_PART_INSTALL"
      # Create a venv with --copies so bin/python3.12 is a real interpreter
      # bundled in the snap, not a symlink to the host's /usr/bin/python3.12
      # (which may not exist on the host — e.g. Ubuntu 26.04 ships 3.14).
      # Use the absolute system interpreter: on an incremental rebuild a stale
      # staged venv python (with our repointed pyvenv.cfg) can shadow `python3`
      # on PATH and make `venv` fail looking for /snap/<name>/current/bin/python3.
      /usr/bin/python3 -m venv --copies "$CRAFT_PART_INSTALL"
      export PATH="$CRAFT_PART_INSTALL/bin:$PATH"
      pip install --upgrade --no-cache-dir pip setuptools wheel

      # Install all runtime dependencies. --no-build-isolation lets packages
      # see each other during their own build steps, preventing the
      # chromadb-client/httpx chicken-and-egg metadata failure.
      pip install --no-cache-dir --no-build-isolation -r requirements.txt

      mv _setup_app.py setup.py

      # Bundle the python3.12 standard library into the venv so the snap is
      # self-contained.  A classic snap runs against the host filesystem, and
      # the host's system python may not be 3.12 (e.g. Ubuntu 26.04 ships 3.14),
      # so we must not rely on /usr/lib/python3.12 existing at runtime.  The
      # core24 build instance is Ubuntu 24.04, which provides it.
      PYSTDLIB="$(python3 -c 'import sysconfig; print(sysconfig.get_path("stdlib"))')"
      cp -a "${PYSTDLIB}/." "$CRAFT_PART_INSTALL/lib/python3.12/"
      rm -rf "$CRAFT_PART_INSTALL/lib/python3.12/test"  # large, not needed at runtime
      # Strip external/dangling symlinks the Debian stdlib ships (e.g.
      # sitecustomize.py -> /etc/..., and the config-*/libpython3.12.so dev
      # link).  snap-review rejects external symlinks, and these are system
      # hooks / build-time links not needed at runtime.
      find "$CRAFT_PART_INSTALL/lib/python3.12" -type l | while read -r l; do
        case "$(readlink "$l")" in
          /*) rm -f "$l" ;;            # absolute target -> external
          *)  [ -e "$l" ] || rm -f "$l" ;;   # relative + dangling -> remove
        esac
      done

      # Repoint the venv's base python ('home') at the bundled runtime path.
      # A venv resolves its STDLIB from 'home' (not from the venv's own lib),
      # so without this it would look in the host's /usr/lib/python3.12 — which
      # may not exist.  With home pointing into the snap, the venv finds both
      # the bundled stdlib (home -> lib/python3.12) and its site-packages
      # (venv prefix -> lib/python3.12/site-packages).
      sed -i \
        -e "s|^home = .*|home = /snap/${CRAFT_PROJECT_NAME}/current/bin|" \
        -e "s|^executable = .*|executable = /snap/${CRAFT_PROJECT_NAME}/current/bin/python3.12|" \
        "$CRAFT_PART_INSTALL/pyvenv.cfg"

      # Rewrite the venv shebangs from the ephemeral build path to the snap's
      # runtime path so scripts like uvicorn use the snap's own Python and
      # site-packages rather than whatever python3 is on the host.
      find "$CRAFT_PART_INSTALL/bin" -maxdepth 1 -type f | while read -r f; do
        case "$(head -c 60 "$f" 2>/dev/null)" in
          "#!${CRAFT_PART_INSTALL}/bin/python"*)
            sed -i "1s|${CRAFT_PART_INSTALL}|/snap/odysseus/current|" "$f"
            ;;
        esac
      done

      chmod 755 "$CRAFT_PART_INSTALL/bin/python3.12"
      # NOTE: deliberately NOT patchelf-ing the interpreter to core24's linker.
      # Classic confinement uses the host's dynamic linker (as the openclaw
      # reference snap does for node).  A 24.04-built binary runs fine against a
      # newer host glibc (forward-compatible); patching it to core24's linker
      # instead segfaults on hosts whose core24/glibc combination differs
      # (observed on Ubuntu 26.04).  The stdlib is bundled above, so the snap
      # does not depend on the host shipping Python 3.12.

      # Bundle the app source so the launch wrapper can copy it to a writable
      # location on first run. data/, logs/ and services/cache/ are created at
      # runtime in SNAP_USER_COMMON/app and are intentionally excluded here.
      mkdir -p "$CRAFT_PART_INSTALL/opt/odysseus"
      for item in app.py setup.py core src routes static mcp_servers companion services config scripts; do
        [ -e "$item" ] && cp -r "$item" "$CRAFT_PART_INSTALL/opt/odysseus/"
      done

      # APP_VERSION moved to src/constants.py (core/constants.py is now a
      # backward-compat shim that re-exports it); read src first, fall back to
      # core for older revisions.
      VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' src/constants.py 2>/dev/null | head -1)
      [ -n "$VERSION" ] || VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' core/constants.py 2>/dev/null | head -1)
      craftctl set version="$VERSION"
    prime:
      - -usr/share/doc
      - -usr/share/man
      - -usr/share/lintian
